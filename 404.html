<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | LuX F1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117; /* Dark background for a tech feel */
            color: #e6edf3; /* Light text color */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Full viewport height */
            text-align: center;
            padding: 1rem; /* Basic padding */
        }
        .gradient-text {
            background: linear-gradient(90deg, #8b5cf6, #ec4899); /* Purple to Pink gradient */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-2xl mx-auto p-8 rounded-xl shadow-lg card">
        <h1 class="text-6xl md:text-8xl font-extrabold mb-4 gradient-text">404</h1>
        <h2 class="text-3xl md:text-4xl font-bold mb-6 text-white">Page Not Found</h2>
        <p class="text-lg md:text-xl text-gray-300 mb-8">
            Oops! It looks like the page you're looking for doesn't exist.
            Perhaps you typed the address incorrectly, or the page has been moved.
        </p>
        <a href="index.html" class="btn-primary inline-block px-8 py-3 text-lg font-semibold text-white rounded-full shadow-lg hover:shadow-xl transition duration-300">
            Go Back to Homepage
        </a>
        <p class="text-gray-500 text-sm mt-12">
            &copy; 2025 LuX F1 by Dominick, Alex, and CJ. All rights reserved.
        </p>
    </div>
</body>
</html>
