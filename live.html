<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGCJ/RAYZYRY Streams</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h3, h4, h5 {
            margin: 10px 0;
        }

        .stream-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .embed-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            margin-top: 15px;
        }

        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h3>This is a collection of EliteGamerCJ's and RAYZYRY's streams.</h3>
    <h4>They are the same person</h4>

    <!-- EliteGamerCJ Twitch -->
    <div class="stream-container">
        <h5>EliteGamerCJ - Twitch</h5>
        <div class="embed-container">
            <iframe src="https://player.twitch.tv/?channel=elitegamercj&autoplay=false&parent=yourwebsite.com" allowfullscreen></iframe>
        </div>
    </div>

    <!-- EliteGamerCJ Kick -->
    <div class="stream-container">
        <h5>EliteGamerCJ - Kick</h5>
        <div class="embed-container">
            <iframe 
     src="https://player.kick.com/elitegamercj" 
     height="720" 
     width="1280"
     frameborder="0" 
     scrolling="no" 
     allowfullscreen="true"> 
</iframe>
        </div>
    </div>

    <!-- RAYZYRY Kick -->
    <div class="stream-container">
        <h5>RAYZYRY - Kick</h5>
        <div class="embed-container">
            <iframe 
     src="https://player.kick.com/rayzyry" 
     height="720" 
     width="1280"
     frameborder="0" 
     scrolling="no" 
     allowfullscreen="true"> 
</iframe>
        </div>
    </div>

</body>
</html>
