<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* General Styling */
        body {
            font-family: 'Roboto', sans-serif;
            background: #222 url('https://source.unsplash.com/random/1920x1080') no-repeat center center/cover;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            animation: fadeIn 2s ease-in-out;
        }

        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }

        .clock {
            font-size: 2.5rem;
            font-weight: bold;
            animation: pulse 2s infinite alternate;
        }

        .quote-container {
            margin: 20px 0;
            font-size: 1.2rem;
            color: #ccc;
        }

        .quote-container span {
            font-style: italic;
        }

        .quote-container button {
            padding: 10px;
            background: cyan;
            color: black;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .quote-container button:hover {
            background: white;
            color: black;
        }

        .todo-container {
            margin: 20px 0;
        }

        .todo-container input,
        .todo-container button {
            padding: 10px;
            font-size: 1rem;
            margin-top: 5px;
            width: 100%;
        }

        .todo-container ul {
            list-style: none;
            padding: 0;
            margin-top: 10px;
            font-size: 1rem;
        }

        .todo-container li {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        .todo-container li button {
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        .links {
            margin: 10px 0;
        }

        .links a {
            display: inline-block;
            color: cyan;
            text-decoration: none;
            margin: 5px;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: white;
        }

        .bg-btn,
        .mode-btn {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .bg-btn:hover,
        .mode-btn:hover {
            background: cyan;
            color: black;
        }

        /* New Section for AI Query */
        .query-container {
            margin-top: 30px;
            text-align: center;
        }

        .query-container input {
            padding: 10px;
            width: 70%;
            margin-right: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .query-container button {
            padding: 10px;
            background-color: cyan;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .query-container button:hover {
            background-color: white;
            color: black;
        }

        .response-container {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            color: #ccc;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="welcome-message">Welcome Back, <span id="username">RAYZR</span></h1>
        <div class="clock-container">
            <div class="clock" id="clock">00:00:00</div>
        </div>

        <!-- Quote of the Day -->
        <div class="quote-container">
            <p>Quote of the Day: <span id="quote">Loading...</span></p>
            <button onclick="fetchQuote()">Get New Quote</button>
        </div>

        <!-- To-Do List -->
        <div class="todo-container">
            <h3>Your Tasks:</h3>
            <input type="text" id="todo-input" placeholder="Add a new task...">
            <button onclick="addTask()">Add Task</button>
            <ul id="todo-list"></ul>
        </div>

        <!-- AI Query Section -->
        <div class="query-container">
            <input type="text" id="queryInput" placeholder="Ask the AI something...">
            <button onclick="handleQuery()">Submit Query</button>
        </div>
        
        <div class="response-container" id="aiResponse">
            <!-- AI response will appear here -->
        </div>

        <!-- Links -->
        <div class="links" id="links-container">
            <a href="https://google.com" target="_blank"><i class="fas fa-globe"></i> Google</a>
            <a href="https://github.com" target="_blank"><i class="fab fa-github"></i> GitHub</a>
            <a href="https://kick.com" target="_blank"><i class="fas fa-video"></i> Kick</a>
            <a href="https://dashboard.kick.com" target="_blank"><i class="fas fa-chart-line"></i> Kick Dashboard</a>
        </div>

        <button class="bg-btn" onclick="changeBackground()">Change Background</button>
        <button class="mode-btn" onclick="toggleMode()">Toggle Light/Dark Mode</button>
        <button class="mode-btn" onclick="toggleTemperatureUnit()">Toggle °F/°C</button>
    </div>

    <script>
        let isLightMode = false;
        let isFahrenheit = true;
        let tasks = [];
        const apiToken = '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'; // Replace with your Hugging Face API token

        // Quote of the Day
        async function fetchQuote() {
            try {
                const response = await fetch('https://api.quotable.io/random');
                const data = await response.json();
                document.getElementById('quote').textContent = `"${data.content}" - ${data.author}`;
            } catch (error) {
                console.error('Error fetching quote:', error);
            }
        }

        // To-Do List
        function addTask() {
            const taskInput = document.getElementById('todo-input');
            const taskText = taskInput.value.trim();
            if (taskText) {
                tasks.push(taskText);
                taskInput.value = '';
                renderTasks();
            }
        }

        function removeTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        function renderTasks() {
            const todoList = document.getElementById('todo-list');
            todoList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${task}</span>
                    <button onclick="removeTask(${index})">Delete</button>
                `;
                todoList.appendChild(li);
            });
        }

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        // Fetching AI Response
        async function handleQuery() {
            const query = document.getElementById('queryInput').value;
            const responseSection = document.getElementById('aiResponse');

            if (query) {
                const result = await queryAI(query);
                responseSection.textContent = result.generated_text || "Something went wrong with the query.";
            } else {
                responseSection.textContent = "Please enter a query!";
            }
        }

        async function queryAI(inputText) {
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/openai-community/gpt2", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ inputs: inputText })
                });
                const result = await response.json();
                return result[0];
            } catch (error) {
                console.error("Error querying AI:", error);
                return { generated_text: "Error occurred while fetching AI response." };
            }
        }

        // Background Image Fetching from Pexels API
        async function changeBackground() {
            try {
                const response = await fetch('https://api.pexels.com/v1/curated', {
                    headers: {
                        'Authorization': 'YOUR_PEXELS_API_KEY' // Replace with your Pexels API key
                    }
                });
                const data = await response.json();
                const randomImage = data.photos[Math.floor(Math.random() * data.photos.length)].src.original;
                document.body.style.backgroundImage = `url(${randomImage})`;
            } catch (error) {
                console.error('Error fetching background image:', error);
            }
        }

        // Light/Dark Mode Toggle
        function toggleMode() {
            isLightMode = !isLightMode;
            if (isLightMode) {
                document.body.style.backgroundColor = 'white';
                document.body.style.color = 'black';
            } else {
                document.body.style.backgroundColor = 'black';
                document.body.style.color = 'white';
            }
        }

        // Ask for Name
        function askForName() {
            let username = localStorage.getItem('username');
            if (!username) {
                username = prompt('What is your name?');
                if (username) {
                    localStorage.setItem('username', username);
                } else {
                    username = 'User';
                }
            }
            document.getElementById('username').textContent = username;
        }

        askForName();
        fetchQuote();
    </script>
</body>

</html>
