<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* General Styling */
        body {
            font-family: 'Roboto', sans-serif;
            background: #222 url('https://source.unsplash.com/random/1920x1080') no-repeat center center/cover;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            animation: fadeIn 2s ease-in-out;
        }
        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }
        .clock {
            font-size: 2.5rem;
            font-weight: bold;
            animation: pulse 2s infinite alternate;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .search-bar input {
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 5px 0 0 5px;
            width: 70%;
        }
        .search-bar button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 0 5px 5px 0;
            background: cyan;
            color: black;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .search-bar button:hover {
            background: white;
            color: black;
        }
        .weather {
            margin: 10px 0;
            font-size: 1rem;
            opacity: 0.8;
        }
        .forecast {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .forecast div {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px;
            border-radius: 5px;
            text-align: center;
            font-size: 0.9rem;
        }
        .links {
            margin: 10px 0;
        }
        .links a {
            display: inline-block;
            color: cyan;
            text-decoration: none;
            margin: 5px;
            font-size: 1rem;
            transition: color 0.3s ease;
        }
        .links a:hover {
            color: white;
        }
        .bg-btn, .mode-btn {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .bg-btn:hover, .mode-btn:hover {
            background: cyan;
            color: black;
        }
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="welcome-message">Welcome Back, <span id="username">RAYZR</span></h1>
        <div class="clock-container">
            <div class="clock" id="clock">00:00:00</div>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search Google...">
            <button onclick="searchGoogle()">Go</button>
        </div>
        
        <div class="weather" id="weather">Loading weather...</div>
        <div class="forecast" id="forecast"></div>
        
        <div class="links">
            <a href="https://google.com" target="_blank"><i class="fas fa-globe"></i> Google</a>
            <a href="https://github.com" target="_blank"><i class="fab fa-github"></i> GitHub</a>
            <a href="https://kick.com" target="_blank"><i class="fas fa-video"></i> Kick</a>
            <a href="https://dashboard.kick.com" target="_blank"><i class="fas fa-chart-line"></i> Kick Dashboard</a>
        </div>
        
        <button class="bg-btn" onclick="changeBackground()">Change Background</button>
    </div>

    <script>
        // Name Prompt
        function askForName() {
            let username = localStorage.getItem('username');
            if (!username) {
                username = prompt('What is your name?');
                if (username) {
                    localStorage.setItem('username', username);
                } else {
                    username = 'User';
                }
            }
            document.getElementById('username').textContent = username;
        }

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Search Functionality
        function searchGoogle() {
            const query = document.getElementById('search').value;
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }

        // Weather API Integration
        async function fetchWeather() {
            const apiKey = '569b88f71e074621bbd165811251803';
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                const url = `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${latitude},${longitude}&days=3&aqi=no`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('weather').textContent = `🌡️ ${data.current.temp_f}°F - ${data.current.condition.text}`;

                // Display Forecast
                const forecastContainer = document.getElementById('forecast');
                forecastContainer.innerHTML = '';
                data.forecast.forecastday.forEach(day => {
                    const dayDiv = document.createElement('div');
                    dayDiv.innerHTML = `
                        <p>${new Date(day.date).toLocaleDateString('en-US', { weekday: 'short' })}</p>
                        <p>☀️ ${day.day.maxtemp_f}°F / 🌙 ${day.day.mintemp_f}°F</p>
                        <p>${day.day.condition.text}</p>
                    `;
                    forecastContainer.appendChild(dayDiv);
                });
            }, () => {
                document.getElementById('weather').textContent = 'Unable to retrieve weather.';
            });
        }
        fetchWeather();

        // Background Change with Pexels API
        async function changeBackground() {
            const pexelsApiKey = '996gusySgGCKJvAImJC3qtoDNP1QxmHengUSqNTCJhST2iSZGuhRqvas';
            const query = ['nature', 'city', 'abstract', 'space'][Math.floor(Math.random() * 4)];
            const url = `https://api.pexels.com/v1/search?query=${query}&per_page=1&page=1`;
            
            try {
                const response = await fetch(url, {
                    headers: {
                        Authorization: pexelsApiKey
                    }
                });
                const data = await response.json();
                const imageUrl = data.photos[0].src.large;
                document.body.style.backgroundImage = `url('${imageUrl}')`;
                localStorage.setItem('bgImage', imageUrl);
            } catch (error) {
                console.error('Error fetching background:', error);
            }
        }

        // Load Saved Preferences on Page Load
        window.onload = function() {
            askForName();
            const savedBg = localStorage.getItem('bgImage');
            if (savedBg) {
                document.body.style.backgroundImage = `url('${savedBg}')`;
            }
        };
    </script>
</body>
</html>
