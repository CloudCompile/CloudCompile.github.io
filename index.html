<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* General Styling */
        body {
            font-family: 'Roboto', sans-serif;
            background: #222 url('https://source.unsplash.com/random/1920x1080') no-repeat center center/cover;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            animation: fadeIn 2s ease-in-out;
        }

        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }

        .clock {
            font-size: 2.5rem;
            font-weight: bold;
            animation: pulse 2s infinite alternate;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .search-bar input {
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 5px 0 0 5px;
            width: 70%;
        }

        .search-bar button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 0 5px 5px 0;
            background: cyan;
            color: black;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .search-bar button:hover {
            background: white;
            color: black;
        }

        .weather {
            margin: 10px 0;
            font-size: 1rem;
            opacity: 0.8;
        }

        .forecast {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .forecast div {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px;
            border-radius: 5px;
            text-align: center;
            font-size: 0.9rem;
        }

        .links {
            margin: 10px 0;
        }

        .links a {
            display: inline-block;
            color: cyan;
            text-decoration: none;
            margin: 5px;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: white;
        }

        .bg-btn,
        .mode-btn {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .bg-btn:hover,
        .mode-btn:hover {
            background: cyan;
            color: black;
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .chat-header {
            background: #333;
            color: white;
            padding: 10px;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .chat-header i {
            font-size: 1.2rem;
        }

        .chat-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            max-height: 300px;
        }

        .chat-body.hidden {
            display: none;
        }

        .chat-message {
            margin: 10px 0;
        }

        .chat-message.user {
            text-align: right;
            color: cyan;
        }

        .chat-message.ai {
            text-align: left;
            color: #ccc;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #444;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: white;
        }

        .chat-input button {
            padding: 10px 20px;
            background: cyan;
            border: none;
            color: black;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: white;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="welcome-message">Welcome Back, <span id="username">RAYZR</span></h1>
        <div class="clock-container">
            <div class="clock" id="clock">00:00:00</div>
        </div>

        <div class="search-bar">
            <input type="text" id="search" placeholder="Search Google...">
            <button onclick="searchGoogle()">Go</button>
        </div>

        <div class="weather" id="weather">Loading weather...</div>
        <div class="forecast" id="forecast"></div>

        <div class="links" id="links-container">
            <a href="https://google.com" target="_blank"><i class="fas fa-globe"></i> Google</a>
            <a href="https://github.com" target="_blank"><i class="fab fa-github"></i> GitHub</a>
            <a href="https://kick.com" target="_blank"><i class="fas fa-video"></i> Kick</a>
            <a href="https://dashboard.kick.com" target="_blank"><i class="fas fa-chart-line"></i> Kick Dashboard</a>
        </div>

        <button class="bg-btn" onclick="changeBackground()">Change Background</button>
        <button class="mode-btn" onclick="toggleMode()">Toggle Light/Dark Mode</button>
        <button class="mode-btn" onclick="toggleTemperatureUnit()">Toggle °F/°C</button>
    </div>

    <!-- AI Chat Widget -->
    <div class="chat-widget" id="chat-widget">
        <div class="chat-header" onclick="toggleChat()">
            <span>AI Chat</span>
            <i class="fas fa-chevron-up" id="chat-toggle-icon"></i>
        </div>
        <div class="chat-body" id="chat-body">
            <!-- Chat Messages Go Here -->
        </div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let isLightMode = false;
        let isFahrenheit = true;
        let chatOpen = true;
        const apiToken = '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'; // Replace with your Hugging Face API token
        const model = 'gpt-2'; // You can use another model if you prefer

        // Name Prompt
        function askForName() {
            let username = localStorage.getItem('username');
            if (!username) {
                username = prompt('What is your name?');
                if (username) {
                    localStorage.setItem('username', username);
                } else {
                    username = 'User';
                }
            }
            document.getElementById('username').textContent = username;
            updateGreeting();
        }

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
            updateGreeting();
        }
        setInterval(updateClock, 1000);

        // Greeting Based on Time
        function updateGreeting() {
            const now = new Date();
            const hour = now.getHours();
            let greeting = '';
            if (hour < 12) greeting = 'Good Morning';
            else if (hour < 18) greeting = 'Good Afternoon';
            else greeting = 'Good Evening';
            document.getElementById('welcome-message').textContent = `${greeting}, ${document.getElementById('username').textContent}`;
        }

        // Search Functionality
        function searchGoogle() {
            const query = document.getElementById('search').value;
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }

        // Weather API Integration
        async function fetchWeather() {
            const apiKey = '569b88f71e074621bbd165811251803'; // Replace with your actual API key
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                const url = `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${latitude},${longitude}&days=3&aqi=no`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    const temp = isFahrenheit ? data.current.temp_f : data.current.temp_c;
                    const unit = isFahrenheit ? '°F' : '°C';
                    document.getElementById('weather').textContent = `🌡️ ${temp}${unit} - ${data.current.condition.text}`;

                    // Display Forecast
                    const forecastContainer = document.getElementById('forecast');
                    forecastContainer.innerHTML = '';
                    data.forecast.forecastday.forEach(day => {
                        const dayDiv = document.createElement('div');
                        const maxTemp = isFahrenheit ? day.day.maxtemp_f : day.day.maxtemp_c;
                        const minTemp = isFahrenheit ? day.day.mintemp_f : day.day.mintemp_c;
                        dayDiv.innerHTML = `
                            <p>${new Date(day.date).toLocaleDateString('en-US', { weekday: 'short' })}</p>
                            <p>☀️ ${maxTemp}${unit} / 🌙 ${minTemp}${unit}</p>
                            <p>${day.day.condition.text}</p>
                        `;
                        forecastContainer.appendChild(dayDiv);
                    });
                } catch (error) {
                    console.error('Error fetching weather:', error);
                    document.getElementById('weather').textContent = 'Unable to retrieve weather.';
                }
            }, () => {
                document.getElementById('weather').textContent = 'Unable to retrieve weather.';
            });
        }
        fetchWeather();

        // Background Image Fetching from Pexels API
        async function changeBackground() {
            try {
                const response = await fetch('https://api.pexels.com/v1/curated', {
                    headers: {
                        'Authorization': '996gusySgGCKJvAImJC3qtoDNP1QxmHengUSqNTCJhST2iSZGuhRqvas' // Replace with your Pexels API key
                    }
                });
                const data = await response.json();
                const randomImage = data.photos[Math.floor(Math.random() * data.photos.length)].src.original;
                document.body.style.backgroundImage = `url(${randomImage})`;
            } catch (error) {
                console.error('Error fetching background image:', error);
            }
        }

        // Light/Dark Mode Toggle
        function toggleMode() {
            isLightMode = !isLightMode;
            if (isLightMode) {
                document.body.style.backgroundColor = 'white';
                document.body.style.color = 'black';
            } else {
                document.body.style.backgroundColor = 'black';
                document.body.style.color = 'white';
            }
        }

        // Toggle Chat Widget
        function toggleChat() {
            const chatBody = document.getElementById('chat-body');
            const chatToggleIcon = document.getElementById('chat-toggle-icon');
            if (chatOpen) {
                chatBody.classList.add('hidden');
                chatToggleIcon.classList.remove('fa-chevron-up');
                chatToggleIcon.classList.add('fa-chevron-down');
            } else {
                chatBody.classList.remove('hidden');
                chatToggleIcon.classList.remove('fa-chevron-down');
                chatToggleIcon.classList.add('fa-chevron-up');
            }
            chatOpen = !chatOpen;
        }

        // Handle Key Press for Chat Input
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Send Message
        async function sendMessage() {
            const messageInput = document.getElementById('chat-input');
            const messageText = messageInput.value.trim();
            if (messageText) {
                appendMessage('user', messageText);
                messageInput.value = '';
                await getAIResponse(messageText);
            }
        }

        // Append Message to Chat
        function appendMessage(sender, message) {
            const chatBody = document.getElementById('chat-body');
            const messageElement = document.createElement('div');
            messageElement.classList.add('chat-message', sender);
            messageElement.textContent = message;
            chatBody.appendChild(messageElement);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // Get AI Response from Hugging Face API
        async function getAIResponse(userMessage) {
            try {
                const response = await fetch(`https://api-inference.huggingface.co/models/${model}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: userMessage
                    })
                });
                const data = await response.json();
                if (data && data.generated_text) {
                    appendMessage('ai', data.generated_text);
                } else {
                    appendMessage('ai', 'Sorry, I didn’t get that.');
                }
            } catch (error) {
                console.error('Error fetching AI response:', error);
                appendMessage('ai', 'Sorry, something went wrong.');
            }
        }

        askForName();
    </script>
</body>

</html>
