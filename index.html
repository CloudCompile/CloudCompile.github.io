<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* General Styling */
        body {
            font-family: 'Roboto', sans-serif;
            background: #222 url('https://source.unsplash.com/random/1920x1080') no-repeat center center/cover;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            animation: fadeIn 2s ease-in-out;
        }
        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }
        .clock {
            font-size: 2.5rem;
            font-weight: bold;
            animation: pulse 2s infinite alternate;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .search-bar input {
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 5px 0 0 5px;
            width: 70%;
        }
        .search-bar button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 0 5px 5px 0;
            background: cyan;
            color: black;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .search-bar button:hover {
            background: white;
            color: black;
        }
        .weather {
            margin: 10px 0;
            font-size: 1rem;
            opacity: 0.8;
        }
        .forecast {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .forecast div {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px;
            border-radius: 5px;
            text-align: center;
            font-size: 0.9rem;
        }
        .links {
            margin: 10px 0;
        }
        .links a {
            display: inline-block;
            color: cyan;
            text-decoration: none;
            margin: 5px;
            font-size: 1rem;
            transition: color 0.3s ease;
        }
        .links a:hover {
            color: white;
        }
        .bg-btn, .mode-btn {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .bg-btn:hover, .mode-btn:hover {
            background: cyan;
            color: black;
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .chat-header {
            background: #333;
            color: white;
            padding: 10px;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .chat-header i {
            font-size: 1.2rem;
        }
        .chat-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            max-height: 300px;
        }
        .chat-body.hidden {
            display: none;
        }
        .chat-message {
            margin: 10px 0;
        }
        .chat-message.user {
            text-align: right;
            color: cyan;
        }
        .chat-message.ai {
            text-align: left;
            color: #ccc;
        }
        .chat-input {
            display: flex;
            border-top: 1px solid #444;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: white;
        }
        .chat-input button {
            padding: 10px 20px;
            background: cyan;
            border: none;
            color: black;
            cursor: pointer;
        }
        .chat-input button:hover {
            background: white;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="welcome-message">Welcome Back, <span id="username">RAYZR</span></h1>
        <div class="clock-container">
            <div class="clock" id="clock">00:00:00</div>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search Google...">
            <button onclick="searchGoogle()">Go</button>
        </div>
        
        <div class="weather" id="weather">Loading weather...</div>
        <div class="forecast" id="forecast"></div>
        
        <div class="links" id="links-container">
            <a href="https://google.com" target="_blank"><i class="fas fa-globe"></i> Google</a>
            <a href="https://github.com" target="_blank"><i class="fab fa-github"></i> GitHub</a>
            
        </div>
        
        <button class="bg-btn" onclick="changeBackground()">Change Background</button>
        <button class="mode-btn" onclick="toggleMode()">Toggle Light/Dark Mode</button>
        <button class="mode-btn" onclick="toggleTemperatureUnit()">Toggle °F/°C</button>
    </div>



    <script>
        let isLightMode = false;
        let isFahrenheit = true
        }

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
            updateGreeting();
          
        }
      updateClock(); // Ensure the clock loads immediately

        setInterval(updateClock, 1000);

        // Greeting Based on Time
        function updateGreeting() {
            const now = new Date();
            const hour = now.getHours();
            let greeting = '';
            if (hour < 12) greeting = 'Good Morning';
            else if (hour < 18) greeting = 'Good Afternoon';
            else greeting = 'Good Evening';
            document.getElementById('welcome-message').textContent = `${greeting}, ${document.getElementById('username').textContent}`;
        }

        // Search Functionality
        function searchGoogle() {
            const query = document.getElementById('search').value;
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }

        // Weather API Integration
        async function fetchWeather() {
            const apiKey = '569b88f71e074621bbd165811251803'; // Replace with your actual API key
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                const url = `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${latitude},${longitude}&days=3&aqi=no`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    const temp = isFahrenheit ? data.current.temp_f : data.current.temp_c;
                    const unit = isFahrenheit ? '°F' : '°C';
                    document.getElementById('weather').textContent = `🌡️ ${temp}${unit} - ${data.current.condition.text}`;

// Call the function when the page loads
fetchWeather();


                    // Display Forecast
                    const forecastContainer = document.getElementById('forecast');
                    forecastContainer.innerHTML = '';
                    data.forecast.forecastday.forEach(day => {
                        const dayDiv = document.createElement('div');
                        const maxTemp = isFahrenheit ? day.day.maxtemp_f : day.day.maxtemp_c;
                        const minTemp = isFahrenheit ? day.day.mintemp_f : day.day.mintemp_c;
                        dayDiv.innerHTML = `
                            <p>${new Date(day.date).toLocaleDateString('en-US', { weekday: 'short' })}</p>
                            <p>☀️ ${maxTemp}${unit} / 🌙 ${minTemp}${unit}</p>
                            <p>${day.day.condition.text}</p>
                        `;
                        forecastContainer.appendChild(dayDiv);
                    });
                } catch (error) {
                    console.error('Error fetching weather:', error);
                    document.getElementById('weather').textContent = 'Unable to retrieve weather.';
                }
            }, () => {
                document.getElementById('weather').textContent = 'Unable to retrieve weather.';
            });
        }
        fetchWeather();

        // Temperature Unit Toggle
        function toggleTemperatureUnit() {
            isFahrenheit = !isFahrenheit;
            fetchWeather();
        }

        // Background Change with Pexels API
        async function changeBackground() {
            const pexelsApiKey = '996gusySgGCKJvAImJC3qtoDNP1QxmHengUSqNTCJhST2iSZGuhRqvas'; // Replace with your actual API key
            const query = ['nature', 'city', 'abstract', 'space'][Math.floor(Math.random() * 4)];
            const url = `https://api.pexels.com/v1/search?query=${query}&per_page=1&page=1`;
            
            try {
                const response = await fetch(url, {
                    headers: {
                        Authorization: pexelsApiKey
                    }
                });
                const data = await response.json();
                const imageUrl = data.photos[0].src.large;
                document.body.style.backgroundImage = `url('${imageUrl}')`;
                localStorage.setItem('bgImage', imageUrl);
            } catch (error) {
                console.error('Error fetching background:', error);
            }
        }

        // Background Slideshow
        function startBackgroundSlideshow() {
            setInterval(changeBackground, 30000); // Change every 30 seconds
        }

        // Dark/Light Mode Toggle
        function toggleMode() {
            isLightMode = !isLightMode;
            document.body.classList.toggle('light-mode', isLightMode);
            localStorage.setItem('lightMode', isLightMode);
        }

        // Load Saved Preferences on Page Load
       window.onload = function() {
    askForName();
    const savedBg = localStorage.getItem('bgImage');
    if (savedBg) {
        document.body.style.backgroundImage = `url('${savedBg}')`;
    }
    startBackgroundSlideshow();

    const savedMode = localStorage.getItem('lightMode');
    if (savedMode === 'true') {
        isLightMode = true;
        document.body.classList.add('light-mode');
    }

    updateClock(); // Ensure clock initializes immediately
};


    </script>
</body>
</html>
