<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Web IDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            width: 200px;
            background: #252526;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        .file-explorer {
            flex-grow: 1;
            overflow-y: auto;
        }
        .file {
            padding: 5px;
            cursor: pointer;
        }
        .file:hover {
            background: #333;
        }
        .editor-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .tabs {
            display: flex;
            background: #333;
            padding: 5px;
        }
        .tab {
            padding: 5px 10px;
            cursor: pointer;
            background: #444;
            margin-right: 5px;
            border-radius: 3px;
        }
        .tab.active {
            background: #007acc;
        }
        #editor {
            flex-grow: 1;
            background: #1e1e1e;
        }
        .preview {
            height: 40%;
            background: white;
            color: black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Files</h3>
        <div class="file-explorer" id="fileExplorer">
            <div class="file" onclick="openFile('index.html')">index.html</div>
            <div class="file" onclick="openFile('style.css')">style.css</div>
            <div class="file" onclick="openFile('script.js')">script.js</div>
        </div>
    </div>
    <div class="editor-container">
        <div class="tabs" id="tabs"></div>
        <div id="editor">// Write your code here</div>
        <iframe class="preview"></iframe>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs' }});
        require(["vs/editor/editor.main"], function () {
            var editors = {};
            var activeFile = "index.html";
            var files = {
                "index.html": "<html>\n    <head>\n        <title>Preview</title>\n    </head>\n    <body>\n        <h1>Hello, Web IDE!</h1>\n    </body>\n</html>",
                "style.css": "body { background-color: lightblue; }",
                "script.js": "console.log('Hello, Web IDE!');"
            };

            function openFile(filename) {
                if (!editors[filename]) {
                    editors[filename] = monaco.editor.create(document.getElementById('editor'), {
                        value: files[filename],
                        language: filename.endsWith(".js") ? "javascript" : filename.endsWith(".css") ? "css" : "html",
                        theme: "vs-dark"
                    });
                }
                activeFile = filename;
                updateTabs();
            }

            function updateTabs() {
                var tabsContainer = document.getElementById("tabs");
                tabsContainer.innerHTML = "";
                Object.keys(editors).forEach(filename => {
                    var tab = document.createElement("div");
                    tab.className = "tab" + (filename === activeFile ? " active" : "");
                    tab.innerText = filename;
                    tab.onclick = () => openFile(filename);
                    tabsContainer.appendChild(tab);
                });
            }

            openFile("index.html");
        });
    </script>
</body>
</html>
