<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web IDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            width: 60px;
            background: #252526;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
        }
        .sidebar i {
            font-size: 24px;
            margin: 20px 0;
            cursor: pointer;
        }
        .editor-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        #editor {
            flex-grow: 1;
            background: #1e1e1e;
        }
        .preview {
            height: 40%;
            background: white;
            color: black;
            padding: 10px;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            background: #333;
        }
        .toolbar button {
            background: #007acc;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        .toolbar button:hover {
            background: #005f99;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fas fa-file"></i>
        <i class="fas fa-folder"></i>
        <i class="fas fa-cog"></i>
    </div>
    <div class="editor-container">
        <div class="toolbar">
            <button onclick="downloadCode()">Download</button>
            <button onclick="clearEditor()">Clear</button>
        </div>
        <div id="editor">// Write your code here</div>
        <iframe class="preview"></iframe>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs' }});
        require(["vs/editor/editor.main"], function () {
            var editor = monaco.editor.create(document.getElementById('editor'), {
                value: "<html>\n    <head>\n        <title>Preview</title>\n    </head>\n    <body>\n        <h1>Hello, Web IDE!</h1>\n    </body>\n</html>",
                language: "html",
                theme: "vs-dark"
            });

            function updatePreview() {
                document.querySelector(".preview").srcdoc = editor.getValue();
            }

            editor.onDidChangeModelContent(updatePreview);
            updatePreview();

            window.downloadCode = function() {
                const blob = new Blob([editor.getValue()], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'index.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            window.clearEditor = function() {
                editor.setValue("<html>\n    <head>\n        <title>Preview</title>\n    </head>\n    <body>\n        <h1>Hello, Web IDE!</h1>\n    </body>\n</html>");
                updatePreview();
            };
        });
    </script>
</body>
</html>
